x-service-templates:
  base-app: &base-app
    network_mode: "none"
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - sockets:/app/sockets:rw
    ulimits:
      memlock:
        soft: -1
        hard: -1
    deploy:
      resources:
        limits:
          cpus: "0.45"
          memory: 150MB

services:
  app-1:
    <<: *base-app
    environment:
      MODE: "A"
      APP_ID: "APP_1"
      APP_SOCK_PATH: "sockets/one.sock"
  app-2:
    <<: *base-app
    environment:
      MODE: "A"
      APP_ID: "APP_2"
      APP_SOCK_PATH: "sockets/two.sock"

  lb:
    build:
      context: .
      dockerfile: Dockerfile_lb
    ports:
      - "9999:80"
    volumes:
      - sockets:/sockets
    ulimits:
      nofile:
        soft: 65536
        hard: 200000
    networks:
      - lb-net
    depends_on:
      - app-1
      - app-2
    deploy:
      resources:
        limits:
          cpus: "0.1"
          memory: "32MB"

volumes:
  sockets:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: "size=16m,nr_inodes=1k,noatime,huge=always"

networks:
  lb-net:
    driver: bridge
    driver_opts:
      com.docker.network.bridge.enable_ip_masquerade: "false"
      com.docker.network.bridge.enable_icc: "false"

