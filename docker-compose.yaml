x-service-templates:
  base-app: &base-app
    network_mode: "none"
    image: 7se7en/rinha-de-backend-2026-app-asm:v1
    volumes:
      - sockets:/app/sockets:rw
    deploy:
      resources:
        limits:
          cpus: "0.45"
          memory: 16MB

services:
  app-1:
    <<: *base-app
    cpuset: "0"
    environment:
      APP_ID: "APP_1"
      APP_SOCK_PATH: "sockets/one.sock"
  app-2:
    <<: *base-app
    cpuset: "1"
    environment:
      APP_ID: "APP_2"
      APP_SOCK_PATH: "sockets/two.sock"

  lb:
    image: 7se7en/rinha-de-backend-2026-app-lb:v1
    cpuset: "2,3"
    ports:
      - "9999:80"
    volumes:
      - sockets:/sockets
    ulimits:
      memlock: -1
      nofile:
        soft: 65536
        hard: 200000
    networks:
      - lb-net
    depends_on:
      - app-1
      - app-2
    deploy:
      resources:
        limits:
          cpus: "0.1"
          memory: "16MB"

volumes:
  sockets:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: "size=256m,nr_inodes=1k,noatime,huge=always"

networks:
  lb-net:
    driver: bridge
    driver_opts:
      com.docker.network.bridge.enable_ip_masquerade: "false"
      com.docker.network.bridge.enable_icc: "false"

