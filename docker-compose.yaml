x-service-templates:
  base-app: &base-app
    network_mode: "none"
    image: 7se7en/rinha-de-backend-2026-app-asm:v0
    security_opt:
      - seccomp:unconfined
    volumes:
      - sockets:/app/sockets:rw
    deploy:
      resources:
        limits:
          cpus: "0.45"
          memory: 125M

services:
  app-1:
    <<: *base-app
    environment:
      APP_ID: "APP_1"
      APP_SOCK_PATH: "sockets/one.sock"
  app-2:
    <<: *base-app
    environment:
      APP_ID: "APP_2"
      APP_SOCK_PATH: "sockets/two.sock"

  lb:
    image: 7se7en/rinha-de-backend-2026-app-lb:v0
    ports:
      - "9999:80"
    volumes:
      - sockets:/sockets
    ulimits:
      nofile:
        soft: 65536
        hard: 200000
    security_opt:
      - seccomp:unconfined
    sysctls:
      net.core.somaxconn: 65535
      net.ipv4.tcp_max_syn_backlog: 65535
      net.ipv4.tcp_tw_reuse: 1
      net.ipv4.tcp_fin_timeout: 10
      net.ipv4.ip_local_port_range: "1024 65535"
    networks:
      - lb-net
    depends_on:
      - app-1
      - app-2
    deploy:
      resources:
        limits:
          cpus: "0.1"
          memory: "100MB"

volumes:
  sockets:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: "size=256m,nr_inodes=1k,noatime,huge=always"

networks:
  lb-net:
    driver: bridge
    driver_opts:
      com.docker.network.bridge.enable_ip_masquerade: "false"
      com.docker.network.bridge.enable_icc: "false"

